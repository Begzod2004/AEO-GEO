# AEO.GEO — production stack.
#
#   cp .env.prod.example .env   # fill in the values (SECRET_KEY is mandatory)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Topology: nginx proxy (:80) -> landing (LANDING_DOMAIN) and dashboard SPA +
# Django API (APP_DOMAIN). Postgres/Redis/Qdrant are internal-only. See
# deploy/DEPLOY.md for the full runbook (TLS, seed, backups).

x-backend-env: &backend-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env}
  DJANGO_DEBUG: "false"
# localhost = in-container healthcheck; backend = internal calls from the
# landing container (waitlist). :8000 is never published to the host.
  DJANGO_ALLOWED_HOSTS: ${APP_DOMAIN:?set APP_DOMAIN in .env},localhost,backend
  POSTGRES_URL: postgres://aeo:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/aeo
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  AEO_MODE: ${AEO_MODE:-auto}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-AEO.GEO <no-reply@aeo.geo>}
  FRONTEND_URL: https://${APP_DOMAIN}

x-backend-base: &backend-base
  build: ./backend
  image: aeo-geo-backend:prod
  environment: *backend-env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    qdrant:
      condition: service_started

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aeo
      POSTGRES_USER: aeo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeo -d aeo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    <<: *backend-base
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery-worker:
    <<: *backend-base
    command: celery -A config worker -l info
    volumes:
      - media_data:/app/media

  celery-beat:
    <<: *backend-base
    command: celery -A config beat -l info

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: aeo-geo-dashboard:prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile.prod
    image: aeo-geo-landing:prod
    environment:
      AEO_BACKEND_URL: http://backend:8000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
    environment:
      LANDING_DOMAIN: ${LANDING_DOMAIN:?set LANDING_DOMAIN in .env}
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./deploy/nginx:/etc/nginx/templates:ro
    restart: unless-stopped
    depends_on:
      - dashboard
      - landing

volumes:
  postgres_data:
  qdrant_data:
  media_data:
